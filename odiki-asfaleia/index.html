<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Οδική Ασφάλεια</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    a.back { color: #888; font-size: 0.9em; text-decoration: none; margin-bottom: 30px; align-self: flex-start; }
    a.back:hover { text-decoration: underline; }
    h1 { color: #2c3e50; margin-bottom: 10px; font-size: 1.8em; text-align: center; }
    p.sub { color: #666; margin-bottom: 40px; text-align: center; }
    .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .card {
      background: white; border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      padding: 36px 32px; text-align: center; width: 220px;
      text-decoration: none; color: #2c3e50;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .card .icon { font-size: 2.8em; margin-bottom: 14px; }
    .card .label { font-size: 1em; font-weight: bold; line-height: 1.4; }
  </style>
</head>
<body>
  <a class="back" href="../index.html">← Αρχική</a>
  <h1>🚗 Οδική Ασφάλεια</h1>
  <p class="sub">Επιλέξτε κατηγορία</p>
  <div class="cards">
    <a class="card" href="pdfs/index.html">
      <div class="icon">📄</div>
      <div class="label">Φύλλα<br>Εργασίας PDF</div>
    </a>
    <a class="card" href="rest/index.html">
      <div class="icon">📁</div>
      <div class="label">Υπόλοιπο<br>Υλικό</div>
    </a>
  </div>
</body>
</html>
